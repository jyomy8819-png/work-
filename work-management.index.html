// 기존 태그 → 신규 12개 목록 마이그레이션 (페이지 로드 시 1회 자동 실행)
function migrateTagData() {
  const validTags = new Set(TAG_OPTIONS);
  let migrated = 0;
  state.tasks.forEach(task => {
    if (!Array.isArray(task.tags) || task.tags.length === 0) return;
    const converted = task.tags.map(tag => {
      if (validTags.has(tag)) return tag;
      migrated++;
      return 'Others'; // 신규 목록에 없는 태그 → Others로 변환
    });
    task.tags = [...new Set(converted)]; // 중복 제거
  });
  if (migrated > 0) {
    save();
    console.info(`[태그 마이그레이션] ${migrated}개 태그 → "Others" 변환 완료`);
  }
}

// ===== 2단계: 계층 구조 마이그레이션 =====
// 기존 단일 task → parent type으로 변환 (1회만 실행)
function migrateTaskHierarchy() {
  if (localStorage.getItem('wm_hierarchy_v1')) return;
  state.tasks.forEach(task => {
    if (!task.type) {
      task.type = 'parent';
      task.parentId = null;
      if (!Array.isArray(task.subtasks)) task.subtasks = [];
      if (task.expanded === undefined) task.expanded = true;
      if (task.autoProgress === undefined) task.autoProgress = true;
    }
  });
  localStorage.setItem('wm_hierarchy_v1', '1');
  save();
  console.info('[계층 마이그레이션] 기존 task → parent 변환 완료');
}

// ===== 6-B: 휴지통 필드 마이그레이션 (기존 task에 inTrash/completedAt/trashedAt 추가) =====
function migrateTrashFields() {
  let changed = false;
  state.tasks.forEach(t => {
    if (t.inTrash === undefined)    { t.inTrash = false;    changed = true; }
    if (t.completedAt === undefined) { t.completedAt = null; changed = true; }
    if (t.trashedAt === undefined)   { t.trashedAt = null;   changed = true; }
  });
  if (changed) save();
}

// ===== 3-A: 링크/첨부 마이그레이션 (기존 task에 빈 배열 추가) =====
function migrateLinksAttachments() {
  let changed = false;
  state.tasks.forEach(t => {
    if (!Array.isArray(t.links))       { t.links = [];       changed = true; }
    if (!Array.isArray(t.attachments)) { t.attachments = []; changed = true; }
  });
  if (changed) save();
}

// ===== 4-A: 상태 마이그레이션 (1회 실행) =====
function migrateTaskStatus() {
  if (localStorage.getItem('wm_status_v1')) return;
  let changed = false;
  state.tasks.forEach(t => {
    if (t.status === 'done')  { t.status = 'completed'; changed = true; }
    if (t.status === 'hold')  { t.status = 'issue';     changed = true; }
  });
  if (changed) save();
  localStorage.setItem('wm_status_v1', '1');
}

// ===== 4-B: issue→pending 키 마이그레이션 (1회) =====
function migratePendingRename() {
  if (localStorage.getItem('wm_pending_v1')) return;
  let changed = false;
  state.tasks.forEach(t => {
    if (t.status === 'issue') { t.status = 'pending'; changed = true; }
  });
  if (changed) save();
  localStorage.setItem('wm_pending_v1', '1');
}

// ===== 4-A: 부모 태스크 상태 자동 집계 =====
function calcParentStatus(parentId) {
  const parent = state.tasks.find(t => t.id === parentId);
  if (!parent) return;
  const subs = getSubtasks(parentId).filter(t => !t.inTrash);
  if (subs.length === 0) return;
  if (subs.every(t => t.status === 'completed'))      parent.status = 'completed';
  else if (subs.some(t => t.status === 'pending'))     parent.status = 'pending';
  else if (subs.some(t => t.status === 'progress'))    parent.status = 'progress';
  else                                                  parent.status = 'not';
}

// ===== 4-B: pendingHistory/pendingExpanded 필드 마이그레이션 (1회) =====
function migratePendingHistory() {
  if (localStorage.getItem('wm_pending_history_v1')) return;
  let changed = false;
  state.tasks.forEach(t => {
    if (!Array.isArray(t.pendingHistory)) { t.pendingHistory = []; changed = true; }
    if (t.pendingExpanded === undefined)  { t.pendingExpanded = false; changed = true; }
  });
  if (changed) save();
  localStorage.setItem('wm_pending_history_v1', '1');
}

// ===== 4-A: 상태 변경 (progress 자동 반영) =====
function setTaskStatus(id, newStatus) {
  const t = state.tasks.find(x => x.id === id);
  if (!t) return;
  const prevStatus = t.status;
  // Pending 해제 시 활성 메모 resolvedAt 기록
  if (prevStatus === 'pending' && newStatus !== 'pending') {
    resolvePendingMemo(id);
  }
  t.status = newStatus;
  if (newStatus in STATUS_PROGRESS_MAP) t.progress = STATUS_PROGRESS_MAP[newStatus];
  // completedAt 자동 기록
  if (newStatus === 'completed' && !t.completedAt) t.completedAt = new Date().toISOString();
  else if (newStatus !== 'completed') t.completedAt = null;
  if (t.type === 'subtask' && t.parentId) {
    calcParentProgress(t.parentId);
    calcParentStatus(t.parentId);
  }
  save();
  renderContent();
  // Pending 선택 시 메모 모달 즉시 팝업
  if (newStatus === 'pending') {
    openPendingMemoModal(id);
  }
}

// ===== 4-B: Pending 메모 핵심 함수들 =====
function getActivePendingMemo(task) {
  if (!Array.isArray(task.pendingHistory)) return null;
  return task.pendingHistory.find(m => m.isActive) || null;
}

function openPendingMemoModal(taskId) {
  const t = state.tasks.find(x => x.id === taskId);
  if (!t) return;
  const html = `
  <div class="modal-overlay" id="pendingMemoModal" onclick="if(event.target===this)_cancelPendingMemo('${taskId}')">
    <div class="modal" style="max-width:440px">
      <div class="modal-header">
        <h3>💭 Pending 사유 입력</h3>
        <button class="icon-btn" onclick="_cancelPendingMemo('${taskId}')">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Pending 사유</label>
          <textarea id="pmReason" rows="3" placeholder="예: 회사로부터 자료 미수령" style="width:100%;resize:vertical;border:1px solid var(--border);border-radius:5px;padding:8px;background:var(--bg);color:var(--text);box-sizing:border-box"></textarea>
        </div>
        <div class="form-group">
          <label>해결방안 (Action Item)</label>
          <textarea id="pmAction" rows="3" placeholder="예: 5/20까지 미수령 시 리마인더 필요" style="width:100%;resize:vertical;border:1px solid var(--border);border-radius:5px;padding:8px;background:var(--bg);color:var(--text);box-sizing:border-box"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="_cancelPendingMemo('${taskId}')">취소</button>
        <button class="btn btn-primary" onclick="savePendingMemo('${taskId}')">저장</button>
      </div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
  setTimeout(() => document.getElementById('pmReason')?.focus(), 50);
}

function _cancelPendingMemo(taskId) {
  // 이전 상태로 롤백
  const t = state.tasks.find(x => x.id === taskId);
  if (t && t.status === 'pending') {
    const prev = t._prevStatus || 'not';
    delete t._prevStatus;
    t.status = prev;
    if (prev in STATUS_PROGRESS_MAP) t.progress = STATUS_PROGRESS_MAP[prev];
    save();
    renderContent();
  }
  const m = document.getElementById('pendingMemoModal');
  if (m) m.remove();
}

function savePendingMemo(taskId) {
  const t = state.tasks.find(x => x.id === taskId);
  if (!t) return;
  const reason = (document.getElementById('pmReason')?.value || '').trim();
  const action = (document.getElementById('pmAction')?.value || '').trim();
  if (!Array.isArray(t.pendingHistory)) t.pendingHistory = [];
  t.pendingHistory.push({
    id: 'pm_' + Date.now(),
    reason,
    actionItem: action,
    createdAt: new Date().toISOString(),
    resolvedAt: null,
    isActive: true
  });
  delete t._prevStatus;
  save();
  const m = document.getElementById('pendingMemoModal');
  if (m) m.remove();
  renderContent();
  toast('💭 Pending 메모가 저장되었습니다', 'success');
}

function resolvePendingMemo(taskId) {
  const t = state.tasks.find(x => x.id === taskId);
  if (!t || !Array.isArray(t.pendingHistory)) return;
  const active = t.pendingHistory.find(m => m.isActive);
  if (active) {
    active.resolvedAt = new Date().toISOString();
    active.isActive = false;
    toast('✅ Pending이 해제되었습니다. 사유와 해결방안은 히스토리로 보관됩니다.', 'info');
  }
}

function togglePendingExpanded(taskId, event) {
  event.stopPropagation();
  const t = state.tasks.find(x => x.id === taskId);
  if (!t) return;
  t.pendingExpanded = !t.pendingExpanded;
  save();
  renderContent();
}

// ===== 4-B: Pending 메모 편집/삭제/렌더링 =====
function editPendingMemo(taskId, memoId) {
  const wrap = document.getElementById('pmemo-' + memoId);
  if (!wrap) return;
  const t = state.tasks.find(x => x.id === taskId);
  const memo = t?.pendingHistory?.find(m => m.id === memoId);
  if (!memo) return;
  wrap.innerHTML = `
    <div class="pending-edit-area">
      <label class="pending-memo-label">📌 Pending 사유</label>
      <textarea id="peReason-${memoId}">${memo.reason || ''}</textarea>
      <label class="pending-memo-label">✅ 해결방안</label>
      <textarea id="peAction-${memoId}">${memo.actionItem || ''}</textarea>
      <div style="display:flex;gap:6px;margin-top:4px">
        <button class="btn btn-primary btn-sm" onclick="updatePendingMemo('${taskId}','${memoId}')">저장</button>
        <button class="btn btn-secondary btn-sm" onclick="renderContent()">취소</button>
      </div>
    </div>`;
}

function updatePendingMemo(taskId, memoId) {
  const t = state.tasks.find(x => x.id === taskId);
  const memo = t?.pendingHistory?.find(m => m.id === memoId);
  if (!memo) return;
  memo.reason = (document.getElementById('peReason-' + memoId)?.value || '').trim();
  memo.actionItem = (document.getElementById('peAction-' + memoId)?.value || '').trim();
  save();
  renderContent();
  toast('메모가 수정되었습니다', 'success');
}

function deletePendingMemo(taskId, memoId) {
  if (!confirm('이 Pending 메모를 삭제하시겠습니까? 히스토리에서도 영구 삭제됩니다.')) return;
  const t = state.tasks.find(x => x.id === taskId);
  if (!t || !Array.isArray(t.pendingHistory)) return;
  t.pendingHistory = t.pendingHistory.filter(m => m.id !== memoId);
  save();
  renderContent();
  toast('메모가 삭제되었습니다', 'info');
}

function formatPendingDuration(createdAt, resolvedAt) {
  const start = new Date(createdAt);
  const end = resolvedAt ? new Date(resolvedAt) : new Date();
  const diffMs = end - start;
  const diffMin = Math.floor(diffMs / 60000);
  if (diffMin < 60) return diffMin + '분';
  const diffH = Math.floor(diffMin / 60);
  if (diffH < 24) return diffH + '시간';
  return Math.floor(diffH / 24) + '일';
}

function toggleHistorySection(memoListId) {
  const el = document.getElementById(memoListId);
  if (!el) return;
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function renderPendingMemoSection(task) {
  if (!Array.isArray(task.pendingHistory) || task.pendingHistory.length === 0) return '';
  const active = task.pendingHistory.find(m => m.isActive);
  const history = task.pendingHistory.filter(m => !m.isActive);
  const histId = 'ph-' + task.id;

  let activePart = '';
  if (active) {
    const d = new Date(active.createdAt);
    const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    activePart = `
      <div class="pending-active-memo" id="pmemo-${active.id}">
        <div class="pending-memo-label">📌 Pending 사유</div>
        <div class="pending-memo-text">${active.reason || '(사유 없음)'}</div>
        ${active.actionItem ? `<div class="pending-memo-label" style="margin-top:8px">✅ 해결방안</div><div class="pending-memo-text">${active.actionItem}</div>` : ''}
        <div class="pending-memo-meta">
          🕐 ${dateStr}
          <button class="btn btn-secondary btn-sm" style="padding:1px 7px;font-size:10px" onclick="event.stopPropagation();editPendingMemo('${task.id}','${active.id}')">✏️ 수정</button>
          <button class="btn btn-danger btn-sm" style="padding:1px 7px;font-size:10px" onclick="event.stopPropagation();deletePendingMemo('${task.id}','${active.id}')">🗑️ 삭제</button>
        </div>
      </div>`;
  }

  let histPart = '';
  if (history.length > 0) {
    const items = history.map(m => {
      const dur = formatPendingDuration(m.createdAt, m.resolvedAt);
      const ds = new Date(m.createdAt);
      const de = m.resolvedAt ? new Date(m.resolvedAt) : null;
      const fmtD = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      return `<div class="pending-history-item">
        <b>${fmtD(ds)}${de ? ' ~ ' + fmtD(de) : ''} (${dur})</b><br>
        사유: ${m.reason || '(없음)'}<br>
        ${m.actionItem ? '해결방안: ' + m.actionItem : ''}
      </div>`;
    }).join('');
    histPart = `
      <div class="pending-history-section">
        <div class="pending-history-toggle" onclick="event.stopPropagation();toggleHistorySection('${histId}')">▶ 📜 이전 Pending 기록 (${history.length}건)</div>
        <div id="${histId}" style="display:none">${items}</div>
      </div>`;
  }

  return `<div class="pending-expand-section" onclick="event.stopPropagation()">${activePart}${histPart}</div>`;
}

// ===== 4-A: 인라인 상태 드롭다운 렌더/열기/닫기 =====
function renderStatusBadge(taskId, status, size) {
  const label = STATUS_LABELS[status] || status;
  const STATUS_ICONS = { not:'⏸ ', progress:'▶ ', pending:'⚠️ ', completed:'✓ ' };
  const icon = STATUS_ICONS[status] || '';
  let sz;
  if (size === 'lg')      sz = 'font-size:13px;padding:5px 14px';
  else if (size === 'sm') sz = 'font-size:11px;padding:3px 8px';
  else                    sz = 'font-size:12px;padding:4px 10px';
  return `<span class="status-dd-wrap" id="sdd-wrap-${taskId}">
    <span class="status-dd-badge badge-${status}" style="${sz}" onclick="_openStatusDDSafe('${taskId}',event)">${icon}${label} ▾</span>
    <div class="status-dd-menu" id="sdd-menu-${taskId}">
      ${Object.keys(STATUS_LABELS).map(s => `
        <div class="status-dd-item${s === status ? ' is-current' : ''}" data-s="${s}" onclick="_selectStatus('${taskId}','${s}','${status}')">
          <span class="status-dd-dot" style="background:${STATUS_COLORS[s]}"></span>
          ${STATUS_LABELS[s]}
          ${s === status ? '<span class="status-dd-check">✓</span>' : ''}
        </div>`).join('')}
    </div>
  </span>`;
}

function _openStatusDDSafe(taskId, event) {
  // _prevStatus 저장 후 드롭다운 열기
  const t = state.tasks.find(x => x.id === taskId);
  if (t) t._prevStatus = t.status;
  openStatusDD(taskId, event);
}

function _selectStatus(taskId, newStatus, currentStatus) {
  closeStatusDD();
  if (newStatus !== currentStatus) setTaskStatus(taskId, newStatus);
}

function openStatusDD(taskId, event) {
  event.stopPropagation();
  if (_openStatusDD === taskId) { closeStatusDD(); return; }
  closeStatusDD();
  _openStatusDD = taskId;
  const menu = document.getElementById('sdd-menu-' + taskId);
  if (!menu) return;
  const wrap = document.getElementById('sdd-wrap-' + taskId);
  if (wrap) {
    const rect = wrap.getBoundingClientRect();
    const dropH = 200;
    const spaceBelow = window.innerHeight - rect.bottom;
    menu.style.left = rect.left + 'px';
    menu.style.minWidth = Math.max(rect.width, 170) + 'px';
    if (spaceBelow < dropH && rect.top > dropH) {
      menu.style.top = '';
      menu.style.bottom = (window.innerHeight - rect.top + 4) + 'px';
    } else {
      menu.style.bottom = '';
      menu.style.top = (rect.bottom + 4) + 'px';
    }
  }
  menu.classList.add('open');
}

function closeStatusDD() {
  if (_openStatusDD) {
    const menu = document.getElementById('sdd-menu-' + _openStatusDD);
    if (menu) menu.classList.remove('open');
    _openStatusDD = null;
  }
}

// ===== 3-A: 모달 내 링크 칩 HTML 생성 =====
function renderLinkChips(links, editable) {
  if (!links || links.length === 0) {
    return editable ? '<span style="font-size:11px;color:var(--text3)">링크 없음</span>' : '';
  }
  return links.map((lk, i) => {
    const icon = LINK_ICONS[lk.type] || '🔗';
    const label = lk.title || lk.url;
    if (editable) {
      return `<span class="link-chip" onclick="openLink('${encodeURIComponent(lk.url)}')" title="${lk.url}">
        <span>${icon}</span><span style="max-width:140px;overflow:hidden;text-overflow:ellipsis">${label}</span>
        <button class="link-chip-remove" onclick="event.stopPropagation();removeLinkFromModal(${i})" title="삭제">✕</button>
      </span>`;
    }
    // 카드용 (읽기 전용 클릭)
    return `<span class="link-chip" onclick="event.stopPropagation();openLink('${encodeURIComponent(lk.url)}')" title="${lk.url}">
      <span>${icon}</span><span>${label}</span>
    </span>`;
  }).join('');
}

// ===== 3-A: 모달 내 첨부파일 칩 HTML 생성 =====
function renderAttachChips(attachments, editable) {
  if (!attachments || attachments.length === 0) {
    return editable ? '<span style="font-size:11px;color:var(--text3)">첨부파일 없음</span>' : '';
  }
  return attachments.map((a, i) => {
    const icon = getFileIcon(a.type);
    const sizeStr = formatFileSize(a.size);
    if (editable) {
      return `<span class="attach-chip" onclick="downloadAttach(${i},'_modal')" title="${a.name}">
        <span>${icon}</span>
        <span class="attach-chip-name">${a.name}</span>
        ${sizeStr ? `<span class="attach-chip-size">${sizeStr}</span>` : ''}
        <button class="attach-chip-remove" onclick="event.stopPropagation();removeAttachFromModal(${i})" title="삭제">✕</button>
      </span>`;
    }
    return `<span class="attach-chip" onclick="event.stopPropagation();downloadAttachById('${a.id||''}')" title="${a.name}">
      <span>${icon}</span>
      <span class="attach-chip-name">${a.name}</span>
      ${sizeStr ? `<span class="attach-chip-size">${sizeStr}</span>` : ''}
    </span>`;
  }).join('');
}

// ===== 3-A: 링크 열기 =====
function openLink(encodedUrl) {
  const url = decodeURIComponent(encodedUrl);
  if (!url) return;
  // 로컬 경로(드라이브 문자 or UNC) vs web URL 구분
  if (/^[a-zA-Z]:[\\\/]/.test(url) || url.startsWith('\\\\')) {
    toast('로컬 경로: ' + url, 'info');
  } else {
    window.open(url.startsWith('http') ? url : 'https://' + url, '_blank');
  }
}

// ===== 3-A: 링크 추가 (모달 내) =====
function addLinkToModal() {
  const type  = document.getElementById('linkType')?.value || 'web';
  const title = (document.getElementById('linkTitle')?.value || '').trim();
  const url   = (document.getElementById('linkUrl')?.value || '').trim();
  if (!url) { toast('URL 또는 경로를 입력하세요', 'error'); return; }
  _modalLinks.push({ id: uid(), type, title: title || url, url });
  document.getElementById('linkTitle').value = '';
  document.getElementById('linkUrl').value   = '';
  refreshLinkChips();
}

// ===== 3-A: 링크 제거 (모달 내) =====
function removeLinkFromModal(idx) {
  _modalLinks.splice(idx, 1);
  refreshLinkChips();
}

// ===== 3-A: 첨부파일 추가 (파일 선택) =====
function addFilesToModal(event) {
  const MAX = 2 * 1024 * 1024; // 2MB
  const files = [...event.target.files];
  let remaining = files.length;
  if (remaining === 0) return;

  files.forEach(file => {
    const ext = (file.name.split('.').pop() || '').toLowerCase();
    const attach = { id: uid(), name: file.name, type: ext, size: file.size, base64: null, path: '' };
    if (file.size <= MAX) {
      const reader = new FileReader();
      reader.onload = e => {
        attach.base64 = e.target.result;
        _modalAttachments.push(attach);
        if (--remaining === 0) refreshAttachChips();
      };
      reader.readAsDataURL(file);
    } else {
      // 2MB 초과: base64 저장 안 함 (경로만)
      attach.path = file.name; // 브라우저에선 실제 경로 불가, 파일명만
      _modalAttachments.push(attach);
      if (--remaining === 0) refreshAttachChips();
    }
  });
  event.target.value = '';
}

// ===== 3-A: 첨부파일 제거 (모달 내) =====
function removeAttachFromModal(idx) {
  _modalAttachments.splice(idx, 1);
  refreshAttachChips();
}

// ===== 3-A: 칩 목록 재렌더 =====
function refreshLinkChips() {
  const el = document.getElementById('linkChipList');
  if (el) el.innerHTML = renderLinkChips(_modalLinks, true);
}
function refreshAttachChips() {
  const el = document.getElementById('attachChipList');
  if (el) el.innerHTML = renderAttachChips(_modalAttachments, true);
}

// ===== 3-A: 첨부파일 다운로드/열기 (모달 내 인덱스 기준) =====
function downloadAttach(idx, scope) {
  const attach = scope === '_modal' ? _modalAttachments[idx] : null;
  if (!attach) return;
  if (attach.base64) {
    const a = document.createElement('a');
    a.href = attach.base64;
    a.download = attach.name;
    a.click();
  } else {
    toast(`경로: ${attach.path || attach.name} (2MB 초과 파일은 재첨부 필요)`, 'info');
  }
}

// ===== 3-A: 첨부파일 다운로드 (저장된 ID 기준) =====
function downloadAttachById(attachId) {
  // 모든 task에서 해당 ID의 첨부파일 찾기
  for (const t of state.tasks) {
    const a = (t.attachments || []).find(x => x.id === attachId);
    if (a) {
      if (a.base64) {
        const el = document.createElement('a');
        el.href = a.base64;
        el.download = a.name;
        el.click();
      } else {
        toast(`경로: ${a.path || a.name}`, 'info');
      }
      return;
    }
  }
  toast('첨부파일을 찾을 수 없습니다', 'error');
}

// 특정 parent의 subtask 목록 반환
function getSubtasks(parentId) {
  const parent = state.tasks.find(t => t.id === parentId);
  if (!parent || !Array.isArray(parent.subtasks)) return [];
  return parent.subtasks.map(id => state.tasks.find(t => t.id === id)).filter(Boolean);
}

// Parent 진행도 자동 계산 (Subtask 평균)
function calcParentProgress(parentId) {
  const parent = state.tasks.find(t => t.id === parentId);
  if (!parent || !parent.autoProgress) return;
  const subs = getSubtasks(parentId).filter(t => !t.inTrash);
  if (subs.length === 0) { parent.progress = 0; return; }
  parent.progress = Math.round(subs.reduce((s, t) => s + (t.progress || 0), 0) / subs.length);
  // 모든 subtask completed → parent도 completed
  if (subs.every(t => t.status === 'completed')) parent.status = 'completed';
  else if (parent.status === 'completed') parent.status = 'progress';
}

// Parent 펼침/접힘 토글
function toggleParentExpand(parentId, event) {
  event.stopPropagation();
  const p = state.tasks.find(t => t.id === parentId);
  if (!p) return;
  p.expanded = !p.expanded;
  save();
  renderContent();
}

// 필터 매칭 판정 (parent/subtask 공통)
function matchesTaskFilter(task, filterState, search) {
  if (filterState.priority && task.priority !== filterState.priority) return false;
  if (filterState.status && task.status !== filterState.status) return false;
  if (filterState.tag && !(task.tags || []).includes(filterState.tag)) return false;
  if (search) {
    const low = search.toLowerCase();
    if (!task.title.toLowerCase().includes(low) && !(task.desc || '').toLowerCase().includes(low)) return false;
  }
  return true;
}

// autoProgress 토글 시 진행도 슬라이더 활성/비활성
function toggleAutoProgressUI() {
  const auto = document.getElementById('tAutoProgress').checked;
  const slider = document.getElementById('tProgress');
  if (slider) { slider.disabled = auto; slider.style.opacity = auto ? '0.4' : '1'; }

// ===== Task 정렬 (마감일 오름차순 → 우선순위) =====
const PRIORITY_ORDER = { high: 0, med: 1, low: 2 };
function sortTasks(tasks) {
  return [...tasks].sort((a, b) => {
    if (!a.dueDate && !b.dueDate) return 0;
    if (!a.dueDate) return 1;
    if (!b.dueDate) return -1;
    if (a.dueDate !== b.dueDate) return a.dueDate < b.dueDate ? -1 : 1;
    return (PRIORITY_ORDER[a.priority] || 1) - (PRIORITY_ORDER[b.priority] || 1);
  });
}

// ===== 5-C: 캘린더 팝오버 =====
let _calPopover = null;
let _calPopoverEscHandler = null;
let _calPopoverClickHandler = null;

function _closeCalPopover() {
  if (_calPopover) { _calPopover.remove(); _calPopover = null; }
  if (_calPopoverEscHandler) { document.removeEventListener('keydown', _calPopoverEscHandler); _calPopoverEscHandler = null; }
  if (_calPopoverClickHandler) { document.removeEventListener('click', _calPopoverClickHandler); _calPopoverClickHandler = null; }
}

function openCalPopover(html, triggerEvent) {
  _closeCalPopover();
  triggerEvent.stopPropagation();

  const el = document.createElement('div');
  el.className = 'cal-popover';
  el.innerHTML = html;
  document.body.appendChild(el);
  _calPopover = el;

  // 위치 계산
  const rect = triggerEvent.target.closest('.cal-task-dot, .cal-task-wrap, .week-task, .task-card') ?
    triggerEvent.target.closest('.cal-task-dot, .cal-task-wrap, .week-task, .task-card').getBoundingClientRect() :
    { left: triggerEvent.clientX, top: triggerEvent.clientY, right: triggerEvent.clientX, bottom: triggerEvent.clientY, width: 0, height: 0 };

  const pw = 300, ph = Math.min(420, el.scrollHeight + 40);
  let left = rect.right + 8;
  let top  = rect.top;
  if (left + pw > window.innerWidth - 8)  left = rect.left - pw - 8;
  if (left < 8) left = 8;
  if (top + ph > window.innerHeight - 8)  top = window.innerHeight - ph - 8;
  if (top < 8) top = 8;
  el.style.left = left + 'px';
  el.style.top  = top + 'px';

  // ESC 닫기
  _calPopoverEscHandler = e => { if (e.key === 'Escape') _closeCalPopover(); };
  document.addEventListener('keydown', _calPopoverEscHandler);

  // 외부 클릭 닫기 (팝오버 자체 클릭은 제외)
  setTimeout(() => {
    _calPopoverClickHandler = e => { if (!el.contains(e.target)) _closeCalPopover(); };
    document.addEventListener('click', _calPopoverClickHandler);
  }, 0);
}

      <input id="tqe_prog" type="number" min="0" max="100" value="${t.progress||0}" style="width:100%;box-sizing:border-box;padding:5px 8px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text);font-size:12px;margin-bottom:10px">
    </div>

      <button class="btn btn-secondary btn-sm" onclick="openTaskPopover('${taskId}',{target:_calPopover,stopPropagation:()=>{},clientX:_calPopover?parseInt(_calPopover.style.left)||0:0,clientY:_calPopover?parseInt(_calPopover.style.top)||0:0})">← 취소</button>
      <button class="btn btn-primary btn-sm" onclick="saveTaskQuickEdit('${taskId}')">저장</button>
    </div>`;
}

function saveTaskQuickEdit(taskId) {
  const t = state.tasks.find(x => x.id === taskId);
  if (!t) return;
  const title  = (document.getElementById('tqe_title')?.value || '').trim();
  const due    = document.getElementById('tqe_due')?.value || '';
  const pri    = document.getElementById('tqe_pri')?.value || 'med';
  const status = document.getElementById('tqe_status')?.value || t.status;
  const prog   = Math.min(100, Math.max(0, parseInt(document.getElementById('tqe_prog')?.value) || 0));
  if (!title) { toast('제목을 입력하세요', 'warning'); return; }
  t.title    = title;
  t.dueDate  = due;
  t.priority = pri;
  if (status !== t.status) {
    setTaskStatus(taskId, status);
  } else {
    t.progress = prog;
    if (t.type === 'subtask' && t.parentId) { calcParentProgress(t.parentId); calcParentStatus(t.parentId); }
    save();
    renderContent();
  }
  _closeCalPopover();
}

function confirmDeleteTask(taskId) {
  const t = state.tasks.find(x => x.id === taskId);
  if (!t || !_calPopover) return;
  let subList = '';
  if (t.type === 'parent') {
    const subs = state.tasks.filter(x => x.parentId === taskId);
    if (subs.length) {
      subList = `<div style="margin:8px 0;font-size:11px;color:var(--text2)">포함된 하위 태스크 ${subs.length}개도 함께 삭제됩니다:<br>${subs.map(s=>`· ${s.title}`).join('<br>')}</div>`;
    }
  }
  _calPopover.innerHTML = `
    <div class="cal-popover-title" style="color:#EF4444">🗑️ 태스크 삭제</div>
    <div style="font-size:12px;margin-bottom:6px"><strong>${t.title}</strong>을(를) 삭제하시겠습니까?</div>
    ${subList}
    <div style="font-size:11px;color:var(--text2);margin-bottom:10px">이 작업은 되돌릴 수 없습니다.</div>
    <div class="cal-popover-actions">
      <button class="btn btn-secondary btn-sm" onclick="openTaskPopover('${taskId}',{target:_calPopover,stopPropagation:()=>{},clientX:_calPopover?parseInt(_calPopover.style.left)||0:0,clientY:_calPopover?parseInt(_calPopover.style.top)||0:0})">취소</button>
      <button class="btn btn-danger btn-sm" onclick="_doDeleteTask('${taskId}')">삭제 확인</button>
    </div>`;
}

function _doDeleteTask(taskId) {
  const t = state.tasks.find(x => x.id === taskId);
  if (!t) return;
  if (t.type === 'parent') {
    state.tasks = state.tasks.filter(x => x.id !== taskId && x.parentId !== taskId);
  } else {
    state.tasks = state.tasks.filter(x => x.id !== taskId);
    if (t.parentId) {
      const parent = state.tasks.find(x => x.id === t.parentId);
      if (parent) {
        parent.subtasks = (parent.subtasks || []).filter(id => id !== taskId);
        calcParentProgress(t.parentId);
        calcParentStatus(t.parentId);
      }
    }
  }
  save();
  _closeCalPopover();
  renderContent();
  toast(`🗑️ 태스크가 삭제되었습니다`, 'success');
}

// ===== 5-B: 오늘의 포커스 데이터 관리 =====
function loadFocusData() {
  try {
    const raw = localStorage.getItem('wm_today_focus');
    if (!raw) return { date: today(), focusTaskIds: [] };
    const data = JSON.parse(raw);
    // 날짜가 다르면 자동 초기화
    if (data.date !== today()) return { date: today(), focusTaskIds: [] };
    return data;
  } catch (e) { return { date: today(), focusTaskIds: [] }; }
}

function saveFocusData(data) {
  localStorage.setItem('wm_today_focus', JSON.stringify(data));
}

function getFocusTasks() {
  const data = loadFocusData();
  return data.focusTaskIds
    .map(id => state.tasks.find(t => t.id === id))
    .filter(t => t && !t.inTrash);
}

function addFocusTask(taskId) {
  const data = loadFocusData();
  if (data.focusTaskIds.includes(taskId)) return;
  if (data.focusTaskIds.length >= 3) { toast('포커스는 최대 3개까지만 가능합니다', 'warn'); return; }
  data.focusTaskIds.push(taskId);
  saveFocusData(data);
  renderContent();
}

function removeFocusTask(taskId, event) {
  if (event) event.stopPropagation();
  const data = loadFocusData();
  data.focusTaskIds = data.focusTaskIds.filter(id => id !== taskId);
  saveFocusData(data);
  renderContent();
}

function reorderFocusTasks(fromId, toId) {
  const data = loadFocusData();
  const ids = data.focusTaskIds;
  const fi = ids.indexOf(fromId), ti = ids.indexOf(toId);
  if (fi < 0 || ti < 0 || fi === ti) return;
  ids.splice(fi, 1); ids.splice(ti, 0, fromId);
  saveFocusData(data);
  renderContent();
}

function completeFocusTask(taskId, event) {
  if (event) event.stopPropagation();
  const t = state.tasks.find(x => x.id === taskId);
  if (!t) return;
  // confetti 발사 위치
  const rect = event ? event.target.getBoundingClientRect() : { left: window.innerWidth / 2, top: window.innerHeight / 2 };
  launchConfetti(rect.left + rect.width / 2, rect.top + rect.height / 2);
  // 상태 변경
  t.status = 'completed'; t.progress = 100;
  if (t.type === 'subtask' && t.parentId) { calcParentProgress(t.parentId); calcParentStatus(t.parentId); }
  save();
  // 포커스에서 제거
  const data = loadFocusData();
  data.focusTaskIds = data.focusTaskIds.filter(id => id !== taskId);
  saveFocusData(data);
  toast('🎉 완료! 잘하셨어요!', 'success');
  renderContent();
}

function launchConfetti(cx, cy) {
  const colors = ['#EF4444','#F59E0B','#10B981','#3B82F6','#8B5CF6','#EC4899','#14B8A6','#F97316'];
  for (let i = 0; i < 30; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-particle';
    el.style.cssText = [
      `left:${cx + (Math.random() - 0.5) * 80}px`,
      `top:${cy}px`,
      `background:${colors[Math.floor(Math.random() * colors.length)]}`,
      `border-radius:${Math.random() > 0.5 ? '50%' : '2px'}`,
      `animation-duration:${0.9 + Math.random() * 0.8}s`,
      `animation-delay:${Math.random() * 0.3}s`,
      `transform-origin:center`
    ].join(';');
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2000);
  }
}

  function renderList(searchQ, filterEt, filterPri) {
    // Completed 제외, 추천 우선 정렬
    let tasks = state.tasks.filter(t => !t.inTrash && t.status !== 'completed');

    const todayStr = today();

// ===== 5-A: 워크로드 히트맵 데이터 계산 =====
function calcHeatmapData() {
  // 이번 주 월요일 기준 (월요일 시작)
  const now = new Date();
  const dayOfWeek = now.getDay(); // 0=일, 1=월 ... 6=토
  const diffToMon = (dayOfWeek === 0) ? -6 : 1 - dayOfWeek;
  const thisMonday = new Date(now);
  thisMonday.setDate(now.getDate() + diffToMon);
  thisMonday.setHours(0, 0, 0, 0);

  // Parent task만 집계
  const parents = state.tasks.filter(t => !t.inTrash && t.type !== 'subtask' && t.dueDate);

  // 날짜별 task 맵 (key: 'YYYY-MM-DD')
  const dayMap = {};
  parents.forEach(t => {
    if (!dayMap[t.dueDate]) dayMap[t.dueDate] = [];
    dayMap[t.dueDate].push(t);
  });

  // 12주 × 7일 생성
  const weeks = [];
  for (let w = 0; w < 12; w++) {
    const days = [];
    for (let d = 0; d < 7; d++) {
      const dt = new Date(thisMonday);
      dt.setDate(thisMonday.getDate() + w * 7 + d);
      const ds = dt.toISOString().slice(0, 10);
      const tasksOnDay = dayMap[ds] || [];
      const incomplete = tasksOnDay.filter(t => t.status !== 'completed').length;
      const completed  = tasksOnDay.filter(t => t.status === 'completed').length;
      days.push({ date: dt, dateStr: ds, tasks: tasksOnDay, incomplete, completed });
    }
    // 주 합계 (미완료 기준 부하 등급)
    const weekIncomplete = days.reduce((s, d) => s + d.incomplete, 0);
    const weekTotal      = days.reduce((s, d) => s + d.tasks.length, 0);
    let lvl = 0;
    if (weekIncomplete >= 7)      lvl = 4;
    else if (weekIncomplete >= 5) lvl = 3;
    else if (weekIncomplete >= 3) lvl = 2;
    else if (weekIncomplete >= 1) lvl = 1;
    weeks.push({ days, weekIncomplete, weekTotal, lvl, weekIdx: w });
  }
  return { weeks, todayStr: now.toISOString().slice(0, 10) };
}

const HM_DAYS_KO = ['월', '화', '수', '목', '금', '토', '일'];

const HM_LVL_COLORS_DARK  = ['#1F2937', '#14532D', '#713F12', '#7C2D12', '#7F1D1D'];

const HM_LVL_SHORT = ['한가', '여유', '보통', '바쁨', '과부하'];

function _hmCellLvl(incomplete) {
  if (incomplete === 0)      return 0;
  if (incomplete <= 2)       return 1;
  if (incomplete <= 4)       return 2;
  if (incomplete <= 6)       return 3;
  return 4;
}

function renderHeatmapSection() {
  const { weeks, todayStr } = calcHeatmapData();
  const isDark = state.settings.darkMode;
  const lvlColors = isDark ? HM_LVL_COLORS_DARK : HM_LVL_COLORS_LIGHT;

      return `<div class="hm-cell${pastCls}${todayCls}" style="background:${bg}"
        title="${ttText}"
        onclick="openHeatmapPopover('${dateStr}',event)">

    }).join('');

    // 행 우측 인디케이터

    const indicator = `<span class="hm-dot" style="background:${dotColor}"></span>[${weekIncomplete}건]${warn}`;

    return `<div class="hm-row">

        <span>${HM_LVL_SHORT[i]}</span>

  return `<div class="card" style="margin-top:16px">

    </div>

}

// ===== 5-A: 히트맵 팝오버 =====
let _hmPopover = null;

function _closeHmPopover() {
  if (_hmPopover) { _hmPopover.remove(); _hmPopover = null; }
}

function _showHmPopover(html, event) {
  _closeHmPopover();
  event.stopPropagation();
  const el = document.createElement('div');
  el.className = 'hm-popover';
  el.innerHTML = html;
  document.body.appendChild(el);
  _hmPopover = el;

  // 위치 계산 (뷰포트 범위 내)
  const rect = event.target.getBoundingClientRect();
  let top = rect.bottom + 6;
  let left = rect.left;
  const pw = 300, ph = 320;
  if (left + pw > window.innerWidth - 8)  left = window.innerWidth - pw - 8;
  if (top + ph > window.innerHeight - 8)  top = rect.top - ph - 6;
  el.style.top  = top + 'px';
  el.style.left = left + 'px';

  // 외부 클릭 시 닫기
  setTimeout(() => document.addEventListener('click', _closeHmPopover, { once: true }), 0);
}

function _hmPopoverItems(tasks) {
  if (!tasks.length) return `<div class="hm-popover-empty">마감 Task 없음</div>`;
  return tasks.map(t => {
    const color = getETColor(t.etId);
    const etName = getETName(t.etId);
    const statusLabel = STATUS_LABELS[t.status] || t.status;
    return `<div class="hm-popover-item">
      <span style="width:8px;height:8px;border-radius:50%;background:${color};flex-shrink:0;display:inline-block"></span>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px">${t.title}</span>
      <span class="badge badge-${t.status}" style="font-size:9px;padding:1px 5px;flex-shrink:0">${statusLabel}</span>
      <span style="font-size:10px;color:var(--text2);flex-shrink:0">${t.progress||0}%</span>
    </div>`;
  }).join('');
}

function openHeatmapPopover(dateStr, event) {
  const tasks = state.tasks.filter(t => !t.inTrash && t.type !== 'subtask' && t.dueDate === dateStr);
  const d = new Date(dateStr + 'T00:00:00');
  const dayNames = ['일','월','화','수','목','금','토'];
  const title = `${dateStr} (${dayNames[d.getDay()]}) — ${tasks.length}건`;
  const html = `<div class="hm-popover-title">${title}</div>${_hmPopoverItems(tasks)}`;
  _showHmPopover(html, event);
}

function openHeatmapWeekPopover(weekIdx, event) {
  const now = new Date();
  const dayOfWeek = now.getDay();
  const diffToMon = (dayOfWeek === 0) ? -6 : 1 - dayOfWeek;
  const mon = new Date(now);
  mon.setDate(now.getDate() + diffToMon + weekIdx * 7);
  mon.setHours(0,0,0,0);
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  const monStr = mon.toISOString().slice(0,10);
  const sunStr = sun.toISOString().slice(0,10);
  const tasks = state.tasks.filter(t => !t.inTrash && t.type !== 'subtask' && t.dueDate >= monStr && t.dueDate <= sunStr);
  const weekLabel = weekIdx === 0 ? '이번 주' : `+${weekIdx}주`;
  const title = `${weekLabel} (${monStr} ~ ${sunStr}) — ${tasks.length}건`;
  const html = `<div class="hm-popover-title">${title}</div>${_hmPopoverItems(tasks)}`;
  _showHmPopover(html, event);
}

// ===== 3-B: Canvas 도넛차트 그리기 =====
function drawDonutChart(canvas, pct, color) {
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const size = 120;
  canvas.width  = size * dpr;
  canvas.height = size * dpr;
  canvas.style.width  = size + 'px';
  canvas.style.height = size + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const cx = size / 2, cy = size / 2;
  const r  = 48;          // 바깥 반지름
  const thickness = 15;   // 도넛 두께
  const ri = r - thickness;

  // 다크모드 여부 → 트랙 색상
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const trackColor = isDark ? '#374151' : '#E5E7EB';

  // 배경 트랙 (전체 원)
  ctx.beginPath();
  ctx.arc(cx, cy, r - thickness / 2, 0, Math.PI * 2);
  ctx.strokeStyle = trackColor;
  ctx.lineWidth = thickness;
  ctx.stroke();

  // 진행률 호 (12시 방향 = -π/2)
  if (pct > 0) {
    const endAngle = -Math.PI / 2 + (Math.PI * 2 * Math.min(pct, 100) / 100);
    ctx.beginPath();
    ctx.arc(cx, cy, r - thickness / 2, -Math.PI / 2, endAngle);
    ctx.strokeStyle = color;
    ctx.lineWidth   = thickness;
    ctx.lineCap     = 'round';
    ctx.stroke();
  }
}

// 대시보드 내 모든 도넛 재드로잉 (다크모드 전환 시 호출)
function redrawAllDonuts() {
  document.querySelectorAll('canvas[data-donut]').forEach(canvas => {
    const pct   = parseFloat(canvas.getAttribute('data-pct'))  || 0;
    const color = canvas.getAttribute('data-color') || '#2563eb';
    drawDonutChart(canvas, pct, color);
  });
}

// ===== Task 목록 뷰 (계층 구조) =====
function renderTaskList(etId) {
  const et = etId ? getET(etId) : null;
  const filterState = window._filter || {};
  const search = (filterState.search || '').toLowerCase();

  // parent task만 가져와서 필터+정렬
  let parents = state.tasks.filter(t => {
    if (t.type === 'subtask') return false;
    if (t.inTrash) return false;
    if (etId && t.etId !== etId) return false;
    return true;
  });

  // 필터 적용: parent 또는 subtask가 매칭되면 그룹 표시
  const groups = [];
  for (const parent of parents) {
    const allSubs = getSubtasks(parent.id).filter(t => !t.inTrash);
    const parentMatch = matchesTaskFilter(parent, filterState, search);
    const matchingSubs = allSubs.filter(st => matchesTaskFilter(st, filterState, search));
    if (!parentMatch && matchingSubs.length === 0) continue;
    // subtask만 매칭 시 parent 자동 펼침 + 해당 subtask만 표시
    const hasActiveFilter = search || filterState.priority || filterState.status || filterState.tag;
    const displaySubs = hasActiveFilter
      ? (matchingSubs.length > 0 ? matchingSubs : (parentMatch ? allSubs : []))
      : allSubs;
    const forceExpand = !parentMatch && matchingSubs.length > 0;
    groups.push({ parent, subs: displaySubs, forceExpand });
  }

  // parent 마감일/우선순위 정렬
  groups.sort((a, b) => {
    const pa = a.parent, pb = b.parent;
    if (!pa.dueDate && !pb.dueDate) return 0;
    if (!pa.dueDate) return 1; if (!pb.dueDate) return -1;
    if (pa.dueDate !== pb.dueDate) return pa.dueDate < pb.dueDate ? -1 : 1;
    return (PRIORITY_ORDER[pa.priority]||1) - (PRIORITY_ORDER[pb.priority]||1);
  });

  const totalP = groups.length;
  const doneP = groups.filter(g => g.parent.status === 'completed').length;

  return `
  <div class="view-header">
    <div>
      <h2>${et ? et.name : '전체 Task'}</h2>
      <div style="font-size:12px;color:var(--text2);margin-top:2px">${doneP}/${totalP} Parent 완료</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      ${et ? `<div style="color:var(--text2);font-size:13px">${et.memo||''}</div>` : ''}
      <button class="btn btn-primary btn-sm" onclick="openTaskModal(null,'${etId||''}')">+ Parent Task 추가</button>
    </div>
  </div>
  <div class="filter-bar">
    <input type="text" placeholder="제목/Subtask 검색..." value="${filterState.search||''}" oninput="setFilter('search',this.value)" style="width:200px">
    <select onchange="setFilter('priority',this.value)">
      <option value="">우선순위 전체</option>
      <option value="high" ${filterState.priority==='high'?'selected':''}>High</option>
      <option value="med" ${filterState.priority==='med'?'selected':''}>Med</option>
      <option value="low" ${filterState.priority==='low'?'selected':''}>Low</option>
    </select>
    <select onchange="setFilter('status',this.value)">
      <option value="">상태 전체</option>
      <option value="not" ${filterState.status==='not'?'selected':''}>Not Started</option>
      <option value="progress" ${filterState.status==='progress'?'selected':''}>In Progress</option>
      <option value="completed" ${filterState.status==='completed'?'selected':''}>Completed</option>
      <option value="pending" ${filterState.status==='pending'?'selected':''}>Pending</option>
    </select>
    <select onchange="setFilter('tag',this.value)">
      <option value="">태그 전체</option>
      ${TAG_OPTIONS.map(t => `<option value="${t}" ${filterState.tag===t?'selected':''}>${t}</option>`).join('')}
    </select>
    <button class="btn btn-sm" style="background:#EAB308;color:#fff;border:1px solid #CA8A04;font-weight:700" onclick="setFilter('status','pending')" title="Pending만 보기">⚠️ Pending</button>
    <button class="btn btn-secondary btn-sm" onclick="clearFilter()">초기화</button>
  </div>
  ${filterState.tag ? `<div class="tag-filter-indicator"><span>태그 필터:</span><span class="tag-badge" style="background:${TAG_COLORS[filterState.tag]||'#6B7280'}">${filterState.tag}</span><button class="btn btn-secondary btn-sm" onclick="setFilter('tag','')">✕ 필터 해제</button></div>` : ''}
  ${groups.length === 0
    ? '<div class="empty-state"><div class="empty-icon">📋</div><p>Task가 없습니다</p></div>'
    : groups.map(g => renderParentGroup(g, etId)).join('')
  }`;
}

// ===== Parent Task 그룹 렌더 =====
function renderParentGroup(group, etId) {
  const { parent, subs, forceExpand } = group;
  const isExpanded = forceExpand || parent.expanded;
  const etColor = getETColor(parent.etId);
  const dcls = dueDateClass(parent.dueDate);
  const dlbl = dueDateLabel(parent.dueDate);
  const priBadge    = { high:'badge-high', med:'badge-med', low:'badge-low' };

  // Subtask 통계 (필터 무관 전체 기준, 휴지통 제외)
  const allSubs  = getSubtasks(parent.id).filter(t => !t.inTrash);
  const subCount = allSubs.length;
  const subDone  = allSubs.filter(s => s.status === 'completed').length;
  const nextSub  = sortTasks(allSubs.filter(s => s.dueDate && s.status !== 'completed'))[0];
  const nextLbl  = nextSub ? `⏰ 다음: ${nextSub.title.length > 10 ? nextSub.title.slice(0,10)+'…' : nextSub.title} (${dueDateLabel(nextSub.dueDate)})` : '';

  const tags = (parent.tags || []).map(tag => {
    const c = TAG_COLORS[tag] || '#6B7280';
    return `<span class="tag-badge" style="background:${c}" onclick="event.stopPropagation();filterByTag('${tag}')">${tag}</span>`;
  }).join('');

  const expandIcon = isExpanded ? '▼' : '▶';

  // Pending 메모 미리보기
  const activeMemoP = getActivePendingMemo(parent);
  const histCountP = (parent.pendingHistory || []).filter(m => !m.isActive).length;
  const pendingPreviewP = activeMemoP
    ? `<div class="pending-preview" onclick="togglePendingExpanded('${parent.id}',event)">
        💭 ${activeMemoP.reason ? (activeMemoP.reason.length > 30 ? activeMemoP.reason.slice(0,30)+'...' : activeMemoP.reason) : '(사유 없음)'}
        <span style="color:var(--text2);font-size:10px">(${new Date(activeMemoP.createdAt).getMonth()+1}/${new Date(activeMemoP.createdAt).getDate()})</span>
        <span style="margin-left:auto;font-size:10px">${parent.pendingExpanded ? '▲' : '▼'}</span>
      </div>`
    : (histCountP > 0
        ? `<div class="pending-history-link" onclick="togglePendingExpanded('${parent.id}',event)">📜 이전 Pending 기록 ${histCountP}건</div>`
        : '');
  const progColorP = STATUS_COLORS[parent.status] || '#9CA3AF';
  const statusAreaP = `
    <div class="card-status-area" onclick="event.stopPropagation()">
      ${renderStatusBadge(parent.id, parent.status, 'lg')}
      <div class="card-progress-mini">
        <div class="card-progress-mini-bar">
          <div class="card-progress-mini-fill" style="width:${parent.progress||0}%;background:${progColorP}"></div>
        </div>
        <span class="card-progress-mini-pct">${parent.progress||0}%</span>
      </div>
    </div>`;

  return `
  <div class="task-hierarchy-group">
    <div class="task-card ${parent.status==='completed'?'done':''} ${dcls==='overdue'&&parent.status!=='completed'?'overdue':''}"
         style="border-left-color:${etColor}" onclick="openTaskModal('${parent.id}')">
      <button class="expand-toggle" onclick="toggleParentExpand('${parent.id}',event)" title="${isExpanded?'접기':'펼치기'}">${expandIcon}</button>
      <div class="task-check" onclick="event.stopPropagation();toggleTaskDone('${parent.id}')">
        ${parent.status==='completed'?'<svg width="10" height="10" fill="white" viewBox="0 0 12 12"><path d="M2 6l3 3 5-5"/></svg>':''}
      </div>
      <div class="task-body" style="flex:1;min-width:0">
        <div class="task-title">${parent.title}</div>
        <div class="task-meta">
          <span class="badge ${priBadge[parent.priority]||'badge-med'}">${PRIORITY_LABELS[parent.priority]||'Med'}</span>
          ${parent.dueDate?`<span class="due-date ${dcls}">${fmtDate(parent.dueDate)} ${dlbl}</span>`:''}
          ${!etId?`<span style="font-size:11px;color:var(--text2)">${getETName(parent.etId)}</span>`:''}
          ${(parent.links||[]).length?`<span class="card-attach-badge">🔗 ${parent.links.length}</span>`:''}
          ${(parent.attachments||[]).length?`<span class="card-attach-badge">📎 ${parent.attachments.length}</span>`:''}
          ${tags?'<div class="tag-wrap">'+tags+'</div>':''}
        </div>
        <div class="parent-subtask-meta">
          ${subCount>0
            ? `<span>📋 ${subCount}개</span><span style="color:${subDone===subCount&&subCount>0?'var(--success)':'inherit'}">${subDone}/${subCount} 완료</span>`
            : '<span style="color:var(--text3);font-style:italic">Subtask 없음</span>'}
          ${nextLbl?`<span style="color:var(--warn)">${nextLbl}</span>`:''}
        </div>
        ${pendingPreviewP}
        ${parent.pendingExpanded ? renderPendingMemoSection(parent) : ''}
      </div>
      ${statusAreaP}
      <div class="task-actions">
        <button class="icon-btn" style="width:28px;height:28px" onclick="event.stopPropagation();openDuplicateModal('${parent.id}')" title="복제">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        </button>
        <button class="icon-btn" style="width:28px;height:28px" onclick="event.stopPropagation();deleteTask('${parent.id}')" title="삭제">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        </button>
        <button class="icon-btn" style="width:28px;height:28px" onclick="event.stopPropagation();addToOutlook('${parent.id}')" title="Outlook 추가">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </button>
      </div>
    </div>
    ${isExpanded ? `
    <div class="subtask-list">
      ${sortTasks(subs).map(st => renderSubtaskRow(st, etColor)).join('')}
      <button class="add-subtask-btn" onclick="openSubtaskModal('${parent.id}')">＋ Subtask 추가</button>
    </div>` : ''}
  </div>`;
}

// ===== Subtask 행 렌더 =====
function renderSubtaskRow(st, parentColor) {
  const dcls = dueDateClass(st.dueDate);
  const dlbl = dueDateLabel(st.dueDate);
  const priBadge    = { high:'badge-high', med:'badge-med', low:'badge-low' };
  const tags = (st.tags||[]).map(tag => {
    const c = TAG_COLORS[tag]||'#6B7280';
    return `<span class="tag-badge" style="background:${c}" onclick="event.stopPropagation();filterByTag('${tag}')">${tag}</span>`;
  }).join('');
  // Pending 메모 미리보기 (subtask)
  const activeMemoSt = getActivePendingMemo(st);
  const histCountSt = (st.pendingHistory || []).filter(m => !m.isActive).length;
  const pendingPreviewSt = activeMemoSt
    ? `<div class="pending-preview" onclick="togglePendingExpanded('${st.id}',event)">
        💭 ${activeMemoSt.reason ? (activeMemoSt.reason.length > 28 ? activeMemoSt.reason.slice(0,28)+'...' : activeMemoSt.reason) : '(사유 없음)'}
        <span style="color:var(--text2);font-size:10px">(${new Date(activeMemoSt.createdAt).getMonth()+1}/${new Date(activeMemoSt.createdAt).getDate()})</span>
        <span style="margin-left:auto;font-size:10px">${st.pendingExpanded ? '▲' : '▼'}</span>
      </div>`
    : (histCountSt > 0
        ? `<div class="pending-history-link" onclick="togglePendingExpanded('${st.id}',event)">📜 이전 Pending 기록 ${histCountSt}건</div>`
        : '');
  const progColorSt = STATUS_COLORS[st.status] || parentColor;
  const statusAreaSt = `
    <div class="card-status-area" style="min-width:90px" onclick="event.stopPropagation()">
      ${renderStatusBadge(st.id, st.status, 'sm')}
      <div class="card-progress-mini">
        <div class="card-progress-mini-bar" style="width:58px">
          <div class="card-progress-mini-fill" style="width:${st.progress||0}%;background:${progColorSt}"></div>
        </div>
        <span class="card-progress-mini-pct">${st.progress||0}%</span>
      </div>
    </div>`;
  return `
  <div class="subtask-wrap">
    <div class="subtask-connector"></div>
    <div class="subtask-card ${st.status==='completed'?'done':''} ${dcls==='overdue'&&st.status!=='completed'?'overdue':''}"
         style="border-left-color:${parentColor}" onclick="openSubtaskModal('${st.parentId}','${st.id}')"
         oncontextmenu="showSubtaskCtxMenu(event,'${st.parentId}','${st.id}')">
      <div class="task-check" onclick="event.stopPropagation();toggleTaskDone('${st.id}')">
        ${st.status==='completed'?'<svg width="10" height="10" fill="white" viewBox="0 0 12 12"><path d="M2 6l3 3 5-5"/></svg>':''}
      </div>
      <div class="task-body" style="flex:1;min-width:0">
        <div class="task-title" style="font-size:13px">└ ${st.title}</div>
        <div class="task-meta">
          <span class="badge ${priBadge[st.priority]||'badge-med'}" style="font-size:10px">${PRIORITY_LABELS[st.priority]||'Med'}</span>
          ${st.dueDate?`<span class="due-date ${dcls}" style="font-size:11px">${fmtDate(st.dueDate)} ${dlbl}</span>`:''}
          ${(st.links||[]).length?`<span class="card-attach-badge">🔗 ${st.links.length}</span>`:''}
          ${(st.attachments||[]).length?`<span class="card-attach-badge">📎 ${st.attachments.length}</span>`:''}
          ${tags?'<div class="tag-wrap">'+tags+'</div>':''}
        </div>
        ${pendingPreviewSt}
        ${st.pendingExpanded ? renderPendingMemoSection(st) : ''}
      </div>
      ${statusAreaSt}
      <div class="task-actions">
        <button class="icon-btn" style="width:26px;height:26px" onclick="event.stopPropagation();openDuplicateModal('${st.id}')" title="복제">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        </button>
        <button class="icon-btn" style="width:26px;height:26px" onclick="event.stopPropagation();deleteTask('${st.id}')" title="삭제">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        </button>
      </div>
    </div>
  </div>`;
}

function setFilter(key, val) {
  if (!window._filter) window._filter = {};
  window._filter[key] = val;
  renderContent();
}
function clearFilter() {
  window._filter = {};
  renderContent();
}

// ===== 캘린더 =====
function renderCalendar() {
  const year = calendarDate.getFullYear();
  const month = calendarDate.getMonth();
  const modeLabels = { month:'월간', week:'주간', day:'일간' };

  let body = '';
  if (calendarMode === 'month') body = renderMonthCalendar(year, month);
  else if (calendarMode === 'week') body = renderWeekCalendar();
  else body = renderDayCalendar();

  return `
  <div class="calendar-header">
    <div class="calendar-nav">
      <button class="icon-btn" onclick="calNav(-1)">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="cal-month">${year}년 ${month+1}월</span>
      <button class="icon-btn" onclick="calNav(1)">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <button class="btn btn-secondary btn-sm" onclick="calToday()">오늘</button>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <div class="view-tabs">
        ${Object.entries(modeLabels).map(([k,v]) => `<div class="view-tab ${calendarMode===k?'active':''}" onclick="setCalMode('${k}')">${v}</div>`).join('')}
      </div>
      <button class="btn btn-primary btn-sm" onclick="openEventModal()">+ 일정</button>
    </div>
  </div>
  ${body}`;
}

function renderMonthCalendar(year, month) {
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const todayStr = today();

  const dayHeaders = ['일','월','화','수','목','금','토'];
  let html = `<div class="cal-grid">`;
  dayHeaders.forEach((d, i) => {
    html += `<div class="cal-day-header" style="${i===0?'color:var(--danger)':i===6?'color:var(--accent)':''}">${d}</div>`;
  });

  // 앞 빈칸
  for (let i = 0; i < firstDay; i++) {
    const prevDate = new Date(year, month, -firstDay + i + 1);
    html += `<div class="cal-day other-month"><div class="day-num">${prevDate.getDate()}</div></div>`;
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow = new Date(year, month, d).getDay();
    const isToday = dateStr === todayStr;
    const dayTasks = state.tasks.filter(t => !t.inTrash && t.dueDate === dateStr);
    const dayEvents = state.events.filter(e => e.date === dateStr);
    const cls = `cal-day ${isToday?'today':''} ${dow===0?'sunday':dow===6?'saturday':''}`;

    // parent 먼저, subtask 다음 정렬
    const dayParents  = dayTasks.filter(t => t.type !== 'subtask');
    const daySubtasks = dayTasks.filter(t => t.type === 'subtask');
    const orderedDayTasks = [...dayParents, ...daySubtasks];
    html += `<div class="${cls}" onclick="openDateDetail('${dateStr}')">
      <div class="day-num">${d}</div>
      <div class="cal-tasks">
        ${[...orderedDayTasks.map(t => {
            const isSubtask = t.type === 'subtask';
            const bg = getETColor(t.etId);
            const style = isSubtask ? `background:${bg};opacity:0.7;padding-left:6px;` : `background:${bg};font-weight:600;`;
            const onclick = isSubtask ? `openSubtaskModal('${t.parentId}','${t.id}')` : `openTaskModal('${t.id}')`;
            const prefix = isSubtask ? '└ ' : '';
            return `<div class="cal-task-wrap"><div class="cal-task-dot" style="${style}" onclick="event.stopPropagation();${onclick}" title="${t.title}">${prefix}${t.title}</div><div class="cal-task-hover-btns"><button class="cal-task-hover-btn" onclick="event.stopPropagation();openTaskPopover('${t.id}',event)" title="편집/삭제">✏️</button></div></div>`;
          }),
           ...dayEvents.map(e => `<div class="cal-task-wrap"><div class="cal-task-dot" style="background:#0891b2;cursor:pointer" onclick="event.stopPropagation();openEventPopover('${e.id}',event)" title="${e.title}">${e.title}</div><div class="cal-task-hover-btns"><button class="cal-task-hover-btn" onclick="event.stopPropagation();openEventPopover('${e.id}',event)" title="편집/삭제">✏️</button></div></div>`)
          ].slice(0,3).join('')}
        ${orderedDayTasks.length + dayEvents.length > 3 ? `<div style="font-size:10px;color:var(--text2)">+${orderedDayTasks.length+dayEvents.length-3}개</div>` : ''}
      </div>
    </div>`;
  }

  // 뒤 빈칸
  const lastDay = new Date(year, month, daysInMonth).getDay();
  for (let i = 1; i <= 6 - lastDay; i++) {
    html += `<div class="cal-day other-month"><div class="day-num">${i}</div></div>`;
  }
  html += `</div>`;
  return html;
}

function renderWeekCalendar() {
  const wr = weekRange(calendarDate);
  const todayStr = today();
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(wr.start); d.setDate(wr.start.getDate() + i);
    days.push(d);
  }
  const dow = ['일','월','화','수','목','금','토'];
  return `<div class="week-grid">` + days.map((d, i) => {
    const ds = isoDate(d);
    const isToday = ds === todayStr;
    const dayTasks = state.tasks.filter(t => !t.inTrash && t.dueDate === ds);
    const dayEvents = state.events.filter(e => e.date === ds);
    return `<div class="week-col">
      <div class="week-col-header ${isToday?'today-col':''}"
           style="${i===0?'color:var(--danger)':i===6?'color:var(--accent)':''}">
        ${dow[i]} ${d.getDate()}
      </div>
      <div class="week-tasks">
        ${[...dayTasks.map(t => `<div class="cal-task-wrap"><div class="week-task" style="background:${getETColor(t.etId)}" onclick="openTaskModal('${t.id}')">${t.title}</div><div class="cal-task-hover-btns"><button class="cal-task-hover-btn" onclick="event.stopPropagation();openTaskPopover('${t.id}',event)" title="편집/삭제">✏️</button></div></div>`),
           ...dayEvents.map(e => `<div class="cal-task-wrap"><div class="week-task" style="background:#0891b2;cursor:pointer" onclick="event.stopPropagation();openEventPopover('${e.id}',event)">${e.title}</div><div class="cal-task-hover-btns"><button class="cal-task-hover-btn" onclick="event.stopPropagation();openEventPopover('${e.id}',event)" title="편집/삭제">✏️</button></div></div>`)
          ].join('')}
        <div style="margin-top:auto;padding-top:4px">
          <button class="btn btn-secondary btn-sm" style="width:100%;font-size:10px" onclick="openDateDetail('${ds}')">+ 추가</button>
        </div>
      </div>
    </div>`;
  }).join('') + `</div>`;
}

function renderDayCalendar() {
  const ds = isoDate(calendarDate);
  const dayTasks = sortTasks(state.tasks.filter(t => !t.inTrash && t.dueDate === ds));
  const dayEvents = state.events.filter(e => e.date === ds);
  return `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h3>${fmtDate(ds)}</h3>
      <button class="btn btn-primary btn-sm" onclick="openEventModal('${ds}')">+ 일정 추가</button>
    </div>
    ${dayTasks.length === 0 && dayEvents.length === 0 ?
      '<div class="empty-state"><div class="empty-icon">📅</div><p>일정 없음</p></div>' :
      `<div class="task-list">
        ${dayTasks.map(t => renderTaskCard(t)).join('')}

// ===== 간트차트 (계층 구조 반영) =====
function renderGantt() {
  // 날짜가 있는 parent만 기준으로 범위 계산, subtask도 포함
  const allWithDate = state.tasks.filter(t => !t.inTrash && t.startDate && t.dueDate);
  if (allWithDate.length === 0) {
    return `<div class="empty-state"><div class="empty-icon">📊</div><p>시작일과 마감일이 설정된 Task가 없습니다</p></div>`;
  }
  const allDates = allWithDate.flatMap(t => [t.startDate, t.dueDate]);
  const minDate = new Date(allDates.reduce((a,b) => a<b?a:b));
  const maxDate = new Date(allDates.reduce((a,b) => a>b?a:b));
  maxDate.setDate(maxDate.getDate() + 3);
  const totalDays = Math.max(1, Math.round((maxDate - minDate) / 86400000));

  const months = [];
  let cur = new Date(minDate);
  while (cur <= maxDate) {
    const key = `${cur.getFullYear()}-${cur.getMonth()+1}`;
    if (!months.find(m => m.key === key)) months.push({ key, label: `${cur.getFullYear()}.${cur.getMonth()+1}` });
    cur.setDate(cur.getDate() + 1);
  }

  function barHtml(t, isSubtask) {
    if (!t.startDate || !t.dueDate) return '';
    const start = new Date(t.startDate + 'T00:00:00');
    const end   = new Date(t.dueDate   + 'T00:00:00');
    const left  = Math.max(0, Math.round((start - minDate) / 86400000));
    const width = Math.max(1, Math.round((end - start) / 86400000) + 1);
    const lPct  = (left / totalDays * 100).toFixed(2);
    const wPct  = (width / totalDays * 100).toFixed(2);
    const color = getETColor(t.etId);
    const alpha = isSubtask ? 'opacity:0.7;' : '';
    const onclick = isSubtask
      ? `openSubtaskModal('${t.parentId}','${t.id}')`
      : `openTaskModal('${t.id}')`;
    return `<div class="gantt-bar" style="left:${lPct}%;width:${wPct}%;background:${color};${alpha}"
               onclick="${onclick}">${t.title}</div>`;
  }

  // parent 순서대로, 각 parent 아래 subtask 나열
  const parents = sortTasks(state.tasks.filter(t => !t.inTrash && t.type !== 'subtask' && t.startDate && t.dueDate));
  let rows = '';
  for (const p of parents) {
    const color = getETColor(p.etId);
    rows += `<div class="gantt-row">
      <div class="gantt-task-name" title="${p.title}" style="font-weight:600;color:${color}">▶ ${p.title}</div>
      <div class="gantt-bars">${barHtml(p, false)}</div>
    </div>`;
    const subs = sortTasks(getSubtasks(p.id).filter(s => !s.inTrash && s.startDate && s.dueDate));
    for (const s of subs) {
      rows += `<div class="gantt-row">
        <div class="gantt-subtask-name" title="${s.title}">└ ${s.title}</div>
        <div class="gantt-bars">${barHtml(s, true)}</div>
      </div>`;
    }
  }
  // 날짜 없는 parent도 이름만 표시
  const noDateParents = state.tasks.filter(t => !t.inTrash && t.type !== 'subtask' && (!t.startDate || !t.dueDate));
  for (const p of noDateParents) {
    rows += `<div class="gantt-row">
      <div class="gantt-task-name" title="${p.title}" style="color:var(--text3)">${p.title} (날짜 없음)</div>
      <div class="gantt-bars"></div>
    </div>`;
  }

  return `<div class="card"><div class="gantt-wrap"><div class="gantt-container">
    <div class="gantt-header">
      <div class="gantt-task-col">Task</div>
      <div class="gantt-dates">${months.map(m => `<div class="gantt-date-label" style="flex:1">${m.label}</div>`).join('')}</div>
    </div>
    ${rows}
  </div></div></div>`;
}

function saveTask() {
  const title = document.getElementById('tTitle').value.trim();
  if (!title) { toast('제목을 입력하세요','error'); return; }
  const tags = [...document.querySelectorAll('#taskModal input[type=checkbox]:checked')].map(el => el.value);
  const autoProgress = document.getElementById('tAutoProgress')?.checked !== false;
  const newDueDate = document.getElementById('tDue').value;

  // Parent 마감일 단축 시 초과 subtask 경고
  if (taskEditId) {
    const existing = state.tasks.find(t => t.id === taskEditId);
    if (existing && existing.type === 'parent' && newDueDate && existing.dueDate && newDueDate < existing.dueDate) {
      const exceeded = getSubtasks(taskEditId).filter(s => s.dueDate && s.dueDate > newDueDate);
      if (exceeded.length > 0) {
        const names = exceeded.map(s => s.title).join(', ');
        if (!confirm(`다음 Subtask의 마감일이 새 Parent 마감일을 초과합니다:\n${names}\n\n그래도 저장하시겠습니까?`)) return;
      }
    }
  }

  const data = {
    etId: document.getElementById('tEt').value,
    title,
    desc: document.getElementById('tDesc').value,
    startDate: document.getElementById('tStart').value,
    dueDate: newDueDate,
    priority: document.getElementById('tPriority').value,
    status: document.getElementById('tStatus').value,
    progress: parseInt(document.getElementById('tProgress').value) || 0,
    estHours: parseFloat(document.getElementById('tEstHours').value) || 0,
    actHours: parseFloat(document.getElementById('tActHours').value) || 0,
    tags,
    repeat: document.getElementById('tRepeat').value,
    autoProgress,
    links: JSON.parse(JSON.stringify(_modalLinks)),
    attachments: JSON.parse(JSON.stringify(_modalAttachments)),
    updatedAt: new Date().toISOString()
  };
  if (taskEditId) {
    const idx = state.tasks.findIndex(t => t.id === taskEditId);
    if (idx >= 0) {
      const prev = state.tasks[idx];
      // completedAt 처리
      if (data.status === 'completed' && !prev.completedAt) data.completedAt = new Date().toISOString();
      else if (data.status !== 'completed') data.completedAt = null;
      state.tasks[idx] = { ...prev, ...data };
      // autoProgress ON이면 저장 후 즉시 재계산
      if (autoProgress) calcParentProgress(taskEditId);
    }
    toast('Task 수정 완료', 'success');
  } else {
    // 새 task는 항상 parent
    state.tasks.push({
      id: uid(), createdAt: new Date().toISOString(),
      type: 'parent', parentId: null, subtasks: [], expanded: true,
      pendingHistory: [], pendingExpanded: false,
      inTrash: false, completedAt: null, trashedAt: null,
      ...data
    });
    toast('Task 추가 완료', 'success');
  }
  save();
  closeModal('taskModal');
  renderContent();
  renderSidebar();
}

function toggleTaskDone(id) {
  const t = state.tasks.find(x => x.id === id);
  if (!t) return;
  t.status = t.status === 'completed' ? 'not' : 'completed';
  t.progress = t.status === 'completed' ? 100 : 0;
  // completedAt 자동 기록
  if (t.status === 'completed' && !t.completedAt) t.completedAt = new Date().toISOString();
  else if (t.status !== 'completed') t.completedAt = null;
  // subtask completed 시 parent 진행도/상태 자동 업데이트
  if (t.type === 'subtask' && t.parentId) { calcParentProgress(t.parentId); calcParentStatus(t.parentId); }
  save();
  renderContent();
}

function deleteTask(id) {
  const task = state.tasks.find(t => t.id === id);
  if (!task) return;
  moveToTrash(id);
}

function openDuplicateModal(taskId) {
  closeModal('taskModal');
  closeModal('cloneModal');
  const t = state.tasks.find(x => x.id === taskId);
  if (!t) return;
  const subs = t.type === 'parent' ? getSubtasks(taskId) : [];
  const dueDate = t.dueDate || today();
  const d = new Date(dueDate + 'T00:00:00');
  function addD(dt, days) { const x = new Date(dt); x.setDate(x.getDate() + days); return x.toISOString().slice(0,10); }
  function addM(dt, months) { const x = new Date(dt); x.setMonth(x.getMonth() + months); return x.toISOString().slice(0,10); }
  const nDay  = addD(d, 1), nWeek = addD(d, 7), nMonth = addM(d, 1);
  const hasDue = !!t.dueDate;
  const html = `
  <div class="modal-overlay" id="cloneModal" onclick="if(event.target===this)closeModal('cloneModal')">
    <div class="modal" style="max-width:480px">
      <div class="modal-header">

function executeDuplicate(taskId) {
  const t = state.tasks.find(x => x.id === taskId);
  if (!t) return;
  const newTitle = (document.getElementById('cloneTitle')?.value || '').trim() || t.title + ' (복사본)';
  let newDue = t.dueDate || '';
  const dueSel = document.querySelector('input[name="cloneDue"]:checked');
  if (dueSel) newDue = dueSel.value === 'custom' ? (document.getElementById('cloneDueCustom')?.value || t.dueDate || '') : dueSel.value;
  const copyTags    = document.getElementById('cloneTags')?.checked !== false;
  const copyLinks   = document.getElementById('cloneLinks')?.checked !== false;
  const copyPending = !!document.getElementById('clonePending')?.checked;
  const copySubs    = !!document.getElementById('cloneSubs')?.checked;
  const statusOpt   = document.querySelector('input[name="cloneStatus"]:checked')?.value || 'not';
  const progOpt     = document.querySelector('input[name="cloneProgress"]:checked')?.value || 'reset';
  const newStatus   = statusOpt === 'keep' ? t.status : 'not';
  const newProgress = progOpt === 'keep' ? (t.progress || 0) : 0;
  const newId = uid();
  const newTask = {
    id: newId, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString(),
    type: t.type || 'parent', parentId: t.type === 'subtask' ? t.parentId : null,
    subtasks: [], expanded: true,
    pendingHistory: copyPending ? JSON.parse(JSON.stringify(t.pendingHistory || [])) : [],
    pendingExpanded: false, etId: t.etId,
    title: newTitle, desc: t.desc || '',
    startDate: t.startDate || '', dueDate: newDue,
    priority: t.priority || 'med', status: newStatus, progress: newProgress,
    estHours: t.estHours || 0, actHours: 0,
    tags: copyTags ? [...(t.tags || [])] : [],
    links: copyLinks ? JSON.parse(JSON.stringify(t.links || [])) : [],
    attachments: copyLinks ? JSON.parse(JSON.stringify(t.attachments || [])) : [],
    repeat: t.repeat || '', autoProgress: t.autoProgress !== false
  };
  state.tasks.push(newTask);
  let subCount = 0;
  if (copySubs && t.type === 'parent') {
    const subs = getSubtasks(taskId);
    const origDt  = t.dueDate ? new Date(t.dueDate + 'T00:00:00') : null;
    const newDueDt = newDue    ? new Date(newDue + 'T00:00:00')    : null;
    for (const sub of subs) {
      let subNewDue = sub.dueDate || '';
      if (origDt && newDueDt && sub.dueDate) {
        const diff = new Date(sub.dueDate + 'T00:00:00') - origDt;
        subNewDue = new Date(newDueDt.getTime() + diff).toISOString().slice(0,10);
      }
      const subId = uid();
      state.tasks.push({
        id: subId, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString(),
        type: 'subtask', parentId: newId, subtasks: [], expanded: false,
        pendingHistory: copyPending ? JSON.parse(JSON.stringify(sub.pendingHistory || [])) : [],
        pendingExpanded: false, etId: sub.etId,
        title: sub.title, desc: sub.desc || '',
        startDate: sub.startDate || '', dueDate: subNewDue,
        priority: sub.priority || 'med',
        status: statusOpt === 'keep' ? sub.status : 'not',
        progress: progOpt === 'keep' ? (sub.progress || 0) : 0,
        estHours: sub.estHours || 0, actHours: 0,
        tags: copyTags ? [...(sub.tags || [])] : [],
        links: copyLinks ? JSON.parse(JSON.stringify(sub.links || [])) : [],
        attachments: copyLinks ? JSON.parse(JSON.stringify(sub.attachments || [])) : [],
        repeat: '', autoProgress: false
      });
      newTask.subtasks.push(subId);
      subCount++;
    }
  }
  if (t.type === 'subtask' && t.parentId) {
    const parent = state.tasks.find(x => x.id === t.parentId);
    if (parent && Array.isArray(parent.subtasks)) parent.subtasks.push(newId);
  }
  save();
  closeModal('cloneModal');
  renderContent();
  renderSidebar();
  const msg = subCount > 0 ? `✅ Task 1개와 Subtask ${subCount}개가 복제되었습니다`
            : t.type === 'subtask' ? '✅ Subtask가 복제되었습니다'
            : '✅ Task가 복제되었습니다';
  toast(msg, 'success');
}

function _csvReadFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    _csvFileText = e.target.result;
    const preview = _csvFileText.slice(0, 400) + (_csvFileText.length > 400 ? '\n...' : '');

}

function _parseCSVText(text) {
  const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').trim().split('\n');
  if (lines.length < 2) return { headers:[], rows:[] };
  function parseLine(line) {
    const res = []; let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
      else if (c === ',' && !inQ) { res.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    res.push(cur.trim()); return res;
  }
  const headers = parseLine(lines[0]).map(h => h.toLowerCase().replace(/[^a-z0-9]/g,''));
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const vals = parseLine(lines[i]);
    const row = {}; headers.forEach((h, idx) => { row[h] = (vals[idx] || '').trim(); });
    row._line = i + 1; rows.push(row);
  }
  return { headers, rows };
}

function _matchET(name) {
  if (!name) return null;
  const low = name.toLowerCase();
  return state.ets.find(e => e.name.toLowerCase() === low) || null;
}

function _parseAndPreviewCSV() {
  const src = _csvFileText || document.getElementById('csvPasteArea')?.value || '';
  if (!src.trim()) { toast('CSV 데이터를 입력하거나 파일을 선택하세요', 'error'); return; }
  const { rows } = _parseCSVText(src);
  if (!rows.length) { toast('데이터 행이 없습니다', 'error'); return; }
  let ok = 0, warn = 0, err = 0;
  const validated = rows.map(row => {
    const errs = [], warns = [];
    if (!row.title) errs.push('제목 없음');
    if (!row.et)    errs.push('ET 없음');
    const etMatch = _matchET(row.et);
    if (row.et && !etMatch) warns.push(`ET "${row.et}" 신규 생성`);
    if (row.duedate && !/^\d{4}-\d{2}-\d{2}$/.test(row.duedate)) warns.push('날짜 형식 오류(YYYY-MM-DD)');
    const type = (row.type || 'parent').toLowerCase();
    if (type === 'subtask' && !row.parenttitle) warns.push('parentTitle 없어 parent로 처리');
    const valid = errs.length === 0;
    if (!valid) err++; else if (warns.length) warn++; else ok++;
    return { ...row, _et:etMatch, _errors:errs, _warns:warns, _valid:valid };
  });
  _csvRows = validated;
  const maxP = Math.min(validated.length, 50);
  const trs = validated.slice(0, maxP).map(row => {
    const icon = row._errors.length ? '❌' : row._warns.length ? '⚠️' : '✅';
    const cls  = row._errors.length ? 'csv-row-err' : row._warns.length ? 'csv-row-warn' : 'csv-row-ok';
    const msg  = [...row._errors, ...row._warns].join(' / ');
    return `<tr><td class="${cls}">${icon}</td><td>${row._line}</td>
      <td title="${row.title}">${(row.title||'-').slice(0,25)}</td>
      <td>${(row.et||'-').slice(0,12)}</td>
      <td>${row.priority||'Med'}</td>
      <td>${row.duedate||'-'}</td>
      <td style="font-size:10px;color:var(--text2)">${msg}</td></tr>`;
  }).join('');
  const validCnt = validated.filter(r => r._valid).length;
  const previewHTML = `
    <div class="csv-summary">
      <span class="csv-row-ok">✅ 정상: ${ok}건</span>
      <span class="csv-row-warn">⚠️ 경고: ${warn}건</span>
      <span class="csv-row-err">❌ 오류: ${err}건</span>
      <span style="color:var(--text2);font-weight:400">(오류 행은 가져오지 않습니다)</span>
    </div>
    <div style="overflow-x:auto;max-height:320px;overflow-y:auto;border:1px solid var(--border);border-radius:6px">
      <table class="csv-preview-table">
        <thead><tr><th>상태</th><th>행</th><th>제목</th><th>ET</th><th>우선순위</th><th>마감일</th><th>비고</th></tr></thead>
        <tbody>${trs}</tbody>
      </table>
    </div>
    ${validated.length > maxP ? `<p style="font-size:11px;color:var(--text2);margin-top:4px">... 외 ${validated.length - maxP}건 더 있음</p>` : ''}`;
  document.getElementById('csvStep1').style.display = 'none';
  document.getElementById('csvStep2').style.display = '';
  document.getElementById('csvPreviewContent').innerHTML = previewHTML;
  document.getElementById('csvModalFooter').innerHTML = `
    <button class="btn btn-secondary" onclick="_csvGoBack()">← 뒤로</button>
    <button class="btn btn-secondary" onclick="closeModal('csvModal')">취소</button>
    ${validCnt > 0
      ? `<button class="btn btn-primary" onclick="executeCSVImport()">📥 ${validCnt}건 가져오기</button>`
      : '<button class="btn btn-primary" disabled style="opacity:0.5">가져올 항목 없음</button>'}`;
}

function executeCSVImport() {
  const valid = _csvRows.filter(r => r._valid);
  if (!valid.length) return;
  const statusMap = { 'not started':'not','in progress':'progress','pending':'pending','completed':'completed' };
  const priMap = { 'high':'high','low':'low','med':'med','medium':'med' };
  function mkStatus(s) { return statusMap[(s||'').toLowerCase()] || 'not'; }
  function mkPri(p)    { return priMap[(p||'').toLowerCase()] || 'med'; }
  let created = 0;
  const parentMap = {}; // title_lower -> newId

  // Pass 1: parents
  const parents  = valid.filter(r => (r.type||'parent').toLowerCase() !== 'subtask');
  const subtasks = valid.filter(r => (r.type||'parent').toLowerCase() === 'subtask');

  for (const row of parents) {
    let etId = row._et?.id;
    if (!etId) {
      const ex = state.ets.find(e => e.name.toLowerCase() === (row.et||'').toLowerCase());
      if (ex) { etId = ex.id; }
      else {
        const ne = { id:uid(), name:row.et, color:ET_COLORS[state.ets.length % ET_COLORS.length], createdAt:new Date().toISOString(), memo:'' };
        state.ets.push(ne); etId = ne.id;
      }
    }
    const newId = uid();
    const tags = row.tags ? row.tags.split(',').map(t=>t.trim()).filter(Boolean) : [];
    state.tasks.push({
      id:newId, createdAt:new Date().toISOString(), updatedAt:new Date().toISOString(),
      type:'parent', parentId:null, subtasks:[], expanded:true,
      pendingHistory:[], pendingExpanded:false, etId,
      title:row.title, desc:row.description||'',
      startDate:'', dueDate:row.duedate||'',
      priority:mkPri(row.priority), status:mkStatus(row.status),
      progress:Math.min(100,Math.max(0,parseInt(row.progress)||0)),
      estHours:0, actHours:0, tags, links:[], attachments:[], repeat:'', autoProgress:true
    });
    parentMap[row.title.toLowerCase()] = newId;
    created++;
  }

  // Pass 2: subtasks
  for (const row of subtasks) {
    const parentKey = (row.parenttitle||'').toLowerCase();
    const parentId  = parentMap[parentKey];
    if (!parentId) { created++; continue; } // fallback: skip unmatchable subtask
    const parent = state.tasks.find(t => t.id === parentId);
    if (!parent) continue;
    let etId = row._et?.id || parent.etId;
    const tags = row.tags ? row.tags.split(',').map(t=>t.trim()).filter(Boolean) : [];
    const subId = uid();
    state.tasks.push({
      id:subId, createdAt:new Date().toISOString(), updatedAt:new Date().toISOString(),
      type:'subtask', parentId, subtasks:[], expanded:false,
      pendingHistory:[], pendingExpanded:false, etId,
      title:row.title, desc:row.description||'',
      startDate:'', dueDate:row.duedate||'',
      priority:mkPri(row.priority), status:mkStatus(row.status),
      progress:Math.min(100,Math.max(0,parseInt(row.progress)||0)),
      estHours:0, actHours:0, tags, links:[], attachments:[], repeat:'', autoProgress:false
    });
    parent.subtasks.push(subId);
    created++;
  }

  save();
  closeModal('csvModal');
  renderSidebar();
  renderContent();
  toast(`📥 ${created}건의 Task가 추가되었습니다`, 'success');
}
